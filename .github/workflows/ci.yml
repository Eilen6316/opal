name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # electron's GUI binary isn't needed for typecheck/build/test — skip the ~100MB download
      - name: Install
        run: npm install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - name: Typecheck (tsc -b)
        run: npm run typecheck
      - name: Test (all workspaces)
        run: npm test
      - name: Build cockpit
        run: npm run build -w apps/desktop
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Headless e2e (mocked model, no key) — the behavior contract
        run: |
          set -e
          for t in ui-smoke richdoc-toolbar word-agent-mock word-review-e2e word-docfmt-e2e word-autobatch-e2e word-docx-import-e2e excel-agent-mock; do
            echo "── $t ──"
            node "test/$t.mjs"
          done

  real-model-smoke:
    # BYOK end-to-end smoke; runs only when the OtterPatch_API_KEY secret is configured.
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - run: npm run typecheck
      - name: Real-model smoke (gated on secret)
        env:
          OtterPatch_API_KEY: ${{ secrets.OtterPatch_API_KEY }}
          OtterPatch_PROVIDER: ${{ vars.OtterPatch_PROVIDER }}
        run: npm run smoke
